<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Statistiques</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48; }
  body { padding-bottom:80px; background:#fcf9f8; }
  .stat-card { background:white;border-radius:12px;border:1px solid #e4bdbb;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .stat-val { font-size:36px;font-weight:800;line-height:1;margin-bottom:6px; }
  .stat-lbl { font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em; }
  .section-card { background:white;border-radius:12px;border:1px solid #e4bdbb;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .progress-track { height:8px;background:#f0eded;border-radius:100px;flex:1;overflow:hidden; }
  .progress-fill { height:100%;border-radius:100px;transition:width .8s ease; }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="material-symbols-outlined" style="font-size:20px;color:white;">emergency</span>
    <h1 style="font-size:17px;font-weight:800;color:white;">Statistiques</h1>
  </div>
</header>

<!-- Hero -->
<section style="background:#840015;padding:16px 20px 36px;">
  <p style="font-size:14px;color:rgba(255,255,255,.8);font-weight:500;">Vue d'ensemble des alertes de Bukavu</p>
</section>

<main style="max-width:900px;margin:-20px auto 0;padding:0 16px 20px;position:relative;z-index:1;">

  <!-- Grille stats -->
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;">
    <div class="stat-card">
      <span class="stat-val" id="statTotal" style="color:#840015;">—</span>
      <span class="stat-lbl">Total alertes</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statResolues" style="color:#00C48C;">—</span>
      <span class="stat-lbl">Résolues</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statCritiques" style="color:#FF3D71;">—</span>
      <span class="stat-lbl">Critiques</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="statQuartier" style="color:#FF9F43;font-size:18px;text-align:center;">—</span>
      <span class="stat-lbl">Zone active</span>
    </div>
  </div>

  <!-- Catégories -->
  <div class="section-card">
    <h2 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:#840015;">category</span>
      Par catégorie
    </h2>
    <div id="catStats" style="display:flex;flex-direction:column;gap:14px;">
      <div class="skeleton" style="height:32px;"></div>
      <div class="skeleton" style="height:32px;"></div>
      <div class="skeleton" style="height:32px;"></div>
    </div>
  </div>

  <!-- Urgences -->
  <div class="section-card">
    <h2 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:#840015;">warning</span>
      Par niveau d'urgence
    </h2>
    <div id="urgStats" style="display:flex;flex-direction:column;gap:14px;"></div>
  </div>

  <!-- Top quartiers -->
  <div class="section-card">
    <h2 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:#840015;">location_on</span>
      Top quartiers
    </h2>
    <div id="quartierStats" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">rss_feed</span>
    <span>Alertes</span>
  </a>
  <a href="publier.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">add_alert</span>
    <span>Publier</span>
  </a>
  <a href="stats.html" class="nav-item active">
    <span class="material-symbols-outlined" style="font-size:22px;">analytics</span>
    <span>Stats</span>
  </a>
  <a href="profil.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">person</span>
    <span>Profil</span>
  </a>
</nav>

<script src="firebase-config.js"></script>
<script>
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = 'login.html'; return; }
  chargerStats();
});

function ligneProgress(label, count, total, color) {
  const pct = total > 0 ? Math.round(count / total * 100) : 0;
  return `
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:13px;font-weight:600;color:#1c1b1b;width:80px;flex-shrink:0;">${label}</span>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%;background:${color};"></div>
      </div>
      <span style="font-size:13px;font-weight:700;color:#906f6d;width:28px;text-align:right;">${count}</span>
    </div>`;
}

async function chargerStats() {
  const snapshot = await db.collection('alertes').get();
  const alertes = snapshot.docs.map(d => d.data());
  const total = alertes.length;
  let resolues = 0, critiques = 0;
  const parCat = {}, parUrg = {}, parQuartier = {};

  alertes.forEach(a => {
    if (a.statut === 'resolue') resolues++;
    if (a.niveauUrgence === 'critique') critiques++;
    parCat[a.categorie] = (parCat[a.categorie] || 0) + 1;
    parUrg[a.niveauUrgence] = (parUrg[a.niveauUrgence] || 0) + 1;
    parQuartier[a.quartier] = (parQuartier[a.quartier] || 0) + 1;
  });

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statResolues').textContent = resolues;
  document.getElementById('statCritiques').textContent = critiques;

  let topQ = '—', maxQ = 0;
  Object.entries(parQuartier).forEach(([q,n]) => { if(n>maxQ){maxQ=n;topQ=q;} });
  document.getElementById('statQuartier').textContent = topQ;

  // Catégories
  document.getElementById('catStats').innerHTML = Object.entries(CATEGORIES).map(([key, cat]) =>
    ligneProgress(cat.label, parCat[key]||0, total, cat.color)
  ).join('');

  // Urgences
  document.getElementById('urgStats').innerHTML = Object.entries(URGENCES).map(([key, urg]) =>
    ligneProgress(urg.label, parUrg[key]||0, total, urg.color)
  ).join('');

  // Quartiers
  const sortedQ = Object.entries(parQuartier).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('quartierStats').innerHTML = sortedQ.length > 0
    ? sortedQ.map(([q,n]) => ligneProgress(q, n, total, '#840015')).join('')
    : '<p style="color:#906f6d;font-size:13px;text-align:center;padding:12px 0;">Aucune donnée disponible</p>';
}
</script>
</body>
</html>
