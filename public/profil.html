<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Mon Profil</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48; }
  body { padding-bottom:80px;background:#fcf9f8; }
  .stat-mini { flex:1;background:white;border-radius:12px;border:1px solid #e4bdbb;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .alerte-row { display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #f0eded; }
  .alerte-row:last-child { border-bottom:none;padding-bottom:0; }
</style>
</head>
<body>

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="material-symbols-outlined" style="font-size:20px;color:white;">emergency</span>
    <h1 style="font-size:17px;font-weight:800;color:white;">Mon Profil</h1>
  </div>
</header>

<!-- Hero sans photo -->
<section style="background:#840015;padding:24px 20px 56px;text-align:center;position:relative;">
  <h2 id="nomUser" style="font-size:20px;font-weight:800;color:white;margin-bottom:2px;">Chargement...</h2>
  <p id="usernameUser" style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px;"></p>
  <p id="emailUser" style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:10px;"></p>
  <span id="quartierBadge" style="background:rgba(255,255,255,.15);color:white;padding:4px 16px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.3);"></span>
</section>

<main style="max-width:640px;margin:-32px auto 0;padding:0 16px;position:relative;z-index:1;">

  <!-- Stats -->
  <div style="display:flex;gap:12px;margin-bottom:14px;">
    <div class="stat-mini">
      <p id="nbAlertes" style="font-size:28px;font-weight:800;color:#840015;line-height:1;margin-bottom:4px;">0</p>
      <p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em;">Alertes</p>
    </div>
    <div class="stat-mini">
      <p id="nbConfirmations" style="font-size:28px;font-weight:800;color:#00C48C;line-height:1;margin-bottom:4px;">0</p>
      <p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em;">Confirmations</p>
    </div>
    <div class="stat-mini">
      <p id="nbFausses" style="font-size:28px;font-weight:800;color:#FF3D71;line-height:1;margin-bottom:4px;">0</p>
      <p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em;">Fausses alertes</p>
    </div>
  </div>

  <!-- Mes alertes -->
  <div class="section-card">
    <h2 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:4px;display:flex;align-items:center;gap:8px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:#840015;">history</span>
      Mes alertes récentes
    </h2>
    <p style="font-size:12px;color:#906f6d;margin-bottom:14px;">Vos 10 dernières publications</p>
    <div id="mesAlertesList">
      <div class="skeleton" style="height:56px;margin-bottom:10px;border-radius:8px;"></div>
      <div class="skeleton" style="height:56px;margin-bottom:10px;border-radius:8px;"></div>
      <div class="skeleton" style="height:56px;border-radius:8px;"></div>
    </div>
  </div>

  <!-- Déconnexion -->
  <button onclick="deconnecter()" style="width:100%;height:52px;background:white;border:1.5px solid #e4bdbb;border-radius:8px;color:#5b403e;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:20px;"
    onmouseover="this.style.borderColor='#840015';this.style.color='#840015';this.style.background='#ffdad8'"
    onmouseout="this.style.borderColor='#e4bdbb';this.style.color='#5b403e';this.style.background='white'">
    <span class="material-symbols-outlined" style="font-size:18px;">logout</span>
    Se déconnecter
  </button>

</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">rss_feed</span><span>Alertes</span></a>
  <a href="publier.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">add_alert</span><span>Publier</span></a>
  <a href="stats.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">analytics</span><span>Stats</span></a>
  <a href="profil.html" class="nav-item active"><span class="material-symbols-outlined" style="font-size:22px;">person</span><span>Profil</span></a>
</nav>

<script src="firebase-config.js"></script>
<script>
let currentUser = null;
let currentUserData = null;

requireAuth().then(async user => {
  currentUser = user;
  document.getElementById('emailUser').textContent = user.email;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      currentUserData = doc.data();
      const d = currentUserData;
      document.getElementById('nomUser').textContent = d.nom || user.email;
      document.getElementById('usernameUser').textContent = d.username ? '@' + d.username : '';
      document.getElementById('quartierBadge').textContent = d.quartier || 'Quartier non défini';
      document.getElementById('nbAlertes').textContent = d.nbAlertes || 0;
      document.getElementById('nbConfirmations').textContent = d.nbConfirmations || 0;
      document.getElementById('nbFausses').textContent = d.nbFaussesAlertes || 0;
    }
  } catch(e) {
    document.getElementById('nomUser').textContent = user.email;
  }
  chargerMesAlertes(user.uid);
});

async function statutStyle(s) {
  const styles = {
    en_attente: { label:'En attente', bg:'#FFF5EC', color:'#FF9F43' },
    confirmee:  { label:'Confirmée',  bg:'#E6FAF5', color:'#00C48C' },
    resolue:    { label:'Résolue',    bg:'#f0eded', color:'#906f6d' },
    suspendue:  { label:'Suspendue',  bg:'#ffdad8', color:'#840015' }
  };
  return styles[s] || styles.en_attente;
}

async function chargerMesAlertes(uid) {
  const list = document.getElementById('mesAlertesList');
  try {
    const snap = await db.collection('alertes')
      .where('userId', '==', uid)
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) {
      list.innerHTML = '<div style="text-align:center;padding:28px 0;"><span class="material-symbols-outlined" style="font-size:36px;color:#e4bdbb;">inbox</span><p style="color:#906f6d;font-size:13px;margin-top:8px;">Aucune alerte publiée</p></div>';
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const a = doc.data();
      const cat = CATEGORIES[a.categorie] || CATEGORIES.autre;
      const urg = URGENCES[a.niveauUrgence] || URGENCES.faible;
      const st = statutStyle(a.statut);
      const temps = a.createdAt ? tempsRelatif(a.createdAt.toMillis()) : '';
      return `
        <div class="alerte-row">
          <div style="width:10px;height:10px;border-radius:50%;background:${urg.color};margin-top:5px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:700;color:#1c1b1b;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(a.titre||'')}</p>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:10px;font-weight:700;background:${cat.bg};color:${cat.color};padding:2px 8px;border-radius:4px;text-transform:uppercase;">${cat.label}</span>
              <span style="font-size:11px;color:#906f6d;">${temps}</span>
              <span style="font-size:11px;color:#906f6d;">${a.nbConfirmations||0} confirmation${(a.nbConfirmations||0)>1?'s':''}</span>
            </div>
          </div>
          <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;background:${st.bg};color:${st.color};white-space:nowrap;flex-shrink:0;">${st.label}</span>
        </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<p style="color:#906f6d;font-size:13px;text-align:center;padding:20px 0;">Impossible de charger les alertes</p>';
  }
}

async function deconnecter() {
  const result = await Swal.fire({
    title: 'Déconnexion',
    text: 'Voulez-vous vraiment vous déconnecter ?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#840015',
    cancelButtonColor: '#906f6d',
    confirmButtonText: 'Oui, déconnecter',
    cancelButtonText: 'Annuler'
  });
  if (result.isConfirmed) {
    await auth.signOut();
    window.location.href = 'login.html';
  }
}
</script>
</body>
</html>
