<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gérez votre profil AlertBukavu — consultez vos alertes, confirmations et statistiques." />
    <title>AlertBukavu — Mon Profil</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48}
      body{padding-bottom:80px}
      .alerte-row{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #efecea}
      .alerte-row:last-child{border-bottom:none;padding-bottom:0}
    </style>
  </head>
  <body>
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="logo.png" alt="Logo" style="width:28px;height:28px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'" />
        <h1 style="font-size:17px;font-weight:800;color:white">AlertBukavu</h1>
      </div>
    </header>

    <section class="hero-section" style="padding:24px 20px 56px;text-align:center">
      <div class="profile-photo-wrap">
        <img id="photoUser" class="profile-photo" src="" alt="Photo de profil" />
        <label for="photoInput" class="photo-edit-btn" title="Changer la photo">
          <span class="material-symbols-outlined" style="font-size:18px">photo_camera</span>
        </label>
        <input id="photoInput" type="file" accept="image/*" style="display:none" onchange="changerPhotoProfil(event)" />
      </div>
      <h2 id="nomUser" style="font-size:20px;font-weight:800;color:white;margin-bottom:2px">Chargement...</h2>
      <p id="usernameUser" style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px"></p>
      <p id="emailUser" style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:10px"></p>
      <span id="quartierBadge" style="background:rgba(255,255,255,.15);color:white;padding:4px 16px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.3)"></span>
    </section>

    <main style="max-width:640px;margin:-32px auto 0;padding:0 16px;position:relative;z-index:1">
      <div style="display:flex;gap:12px;margin-bottom:14px">
        <div class="stat-mini"><p id="nbAlertes" style="font-size:28px;font-weight:800;color:#840015;line-height:1;margin-bottom:4px">0</p><p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em">Alertes</p></div>
        <div class="stat-mini"><p id="nbConfirmations" style="font-size:28px;font-weight:800;color:#00c48c;line-height:1;margin-bottom:4px">0</p><p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em">Confirmations</p></div>
        <div class="stat-mini"><p id="nbFausses" style="font-size:28px;font-weight:800;color:#ff3d71;line-height:1;margin-bottom:4px">0</p><p style="font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em">Fausses alertes</p></div>
      </div>

      <div class="section-card">
        <h2 style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px;display:flex;align-items:center;gap:8px">
          <span class="material-symbols-outlined" style="font-size:18px;color:#840015">history</span>Mes alertes récentes
        </h2>
        <p style="font-size:12px;color:#906f6d;margin-bottom:14px">Vos 10 dernières publications</p>
        <div id="mesAlertesList">
          <div class="skeleton" style="height:56px;margin-bottom:10px;border-radius:8px"></div>
          <div class="skeleton" style="height:56px;margin-bottom:10px;border-radius:8px"></div>
          <div class="skeleton" style="height:56px;border-radius:8px"></div>
        </div>
      </div>

      <button onclick="deconnecter()" class="btn-outline" style="margin-bottom:20px">
        <span class="material-symbols-outlined" style="font-size:18px">logout</span>Se déconnecter
      </button>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">rss_feed</span><span>Alertes</span></a>
      <a href="publier.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">add_alert</span><span>Publier</span></a>
      <a href="stats.html" class="nav-item"><span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24">analytics</span><span>Stats</span></a>
      <a href="profil.html" class="nav-item active"><span class="material-symbols-outlined" style="font-size:22px">person</span><span>Profil</span></a>
    </nav>

    <script src="firebase-config.js"></script>
    <script>
      let currentUser = null, currentUserData = null;

      requireAuth().then(async user => {
        currentUser = user;
        afficherMenuAdmin(false, user);
        document.getElementById('emailUser').textContent = user.email;
        try {
          const doc = await db.collection('users').doc(user.uid).get();
          if (doc.exists) {
            currentUserData = doc.data();
            const d = currentUserData;
            document.getElementById('nomUser').textContent = d.nom || user.email;
            document.getElementById('usernameUser').textContent = d.username ? '@' + d.username : '';
            document.getElementById('quartierBadge').textContent = d.quartier || 'Quartier non défini';
            afficherPhotoProfil(d);
          }
        } catch(e) { document.getElementById('nomUser').textContent = user.email; }
        if (!currentUserData) afficherPhotoProfil({ nom: user.email });
        chargerStatsProfil(user.uid);
        chargerMesAlertes(user.uid);
      });

      function afficherPhotoProfil(data) {
        const img = document.getElementById('photoUser');
        img.onerror = null;
        img.src = getPhotoUrl(data, 104);
        img.onerror = () => { img.onerror = null; img.src = genererAvatar(data?.nom || data?.username || 'U', 104); };
      }

      function statutStyle(s) {
        const styles = { en_attente: {label:'En attente',bg:'#FFF5EC',color:'#FF9F43'}, confirmee: {label:'Confirmée',bg:'#E6FAF5',color:'#00C48C'}, resolue: {label:'Résolue',bg:'#efecea',color:'#906f6d'}, suspendue: {label:'Suspendue',bg:'#ffdad8',color:'#840015'} };
        return styles[s] || styles.en_attente;
      }

      async function chargerStatsProfil(uid) {
        try {
          const [alertesSnap, confirmationsSnap] = await Promise.all([
            db.collection('alertes').where('userId','==',uid).get(),
            db.collection('confirmations').where('userId','==',uid).get()
          ]);
          const alertes = alertesSnap.docs.map(doc => doc.data());
          const fausses = alertes.filter(a => a.statut === 'suspendue').length;
          const totalConfirmationsRecues = alertes.reduce((sum,a) => sum + (a.nbConfirmations||0), 0);
          document.getElementById('nbAlertes').textContent = alertes.length;
          document.getElementById('nbConfirmations').textContent = totalConfirmationsRecues || confirmationsSnap.size;
          document.getElementById('nbFausses').textContent = currentUserData?.nbFaussesAlertes || fausses;
          db.collection('users').doc(uid).update({ nbAlertes: alertes.length, nbConfirmations: totalConfirmationsRecues, nbFaussesAlertes: currentUserData?.nbFaussesAlertes || fausses }).catch(() => {});
        } catch(e) {
          document.getElementById('nbAlertes').textContent = currentUserData?.nbAlertes || 0;
          document.getElementById('nbConfirmations').textContent = currentUserData?.nbConfirmations || 0;
          document.getElementById('nbFausses').textContent = currentUserData?.nbFaussesAlertes || 0;
        }
      }

      function imageFileToDataUrl(file, maxSize = 320) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;
          reader.onload = () => {
            const img = new Image();
            img.onerror = reject;
            img.onload = () => {
              const scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
              const canvas = document.createElement('canvas');
              canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale);
              canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', 0.82));
            };
            img.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      async function changerPhotoProfil(event) {
        const file = event.target.files[0];
        if (!file || !currentUser) return;
        if (!file.type.startsWith('image/')) { showToast('Choisissez une image valide','error'); return; }
        if (file.size > 8*1024*1024) { showToast('Image trop lourde (max 8 Mo)','error'); return; }
        Swal.fire({ title: 'Upload...', text: 'Mise a jour de la photo', allowOutsideClick: false, showConfirmButton: false, didOpen: () => Swal.showLoading() });
        try {
          const previewUrl = URL.createObjectURL(file);
          document.getElementById('photoUser').src = previewUrl;
          let photoUrl;
          try { photoUrl = await uploadImage(file, 'profils'); }
          catch(e1) { try { photoUrl = await uploadImage(file, 'alertes'); } catch(e2) { photoUrl = await imageFileToDataUrl(file); } }
          await db.collection('users').doc(currentUser.uid).set({ photoUrl }, { merge: true });
          currentUserData = { ...(currentUserData||{}), photoUrl };
          afficherPhotoProfil(currentUserData);
          URL.revokeObjectURL(previewUrl);
          Swal.close(); showToast('Photo de profil mise a jour');
        } catch(e) { Swal.close(); showToast('Upload impossible : ' + e.message, 'error'); }
        finally { event.target.value = ''; }
      }

      async function chargerMesAlertes(uid) {
        const list = document.getElementById('mesAlertesList');
        try {
          const snap = await db.collection('alertes').where('userId','==',uid).orderBy('createdAt','desc').limit(10).get();
          if (snap.empty) { list.innerHTML = '<div style="text-align:center;padding:28px 0;"><span class="material-symbols-outlined" style="font-size:36px;color:#ddb8b6;">inbox</span><p style="color:#906f6d;font-size:13px;margin-top:8px;">Aucune alerte publiée</p></div>'; return; }
          list.innerHTML = snap.docs.map(doc => {
            const a = doc.data();
            const cat = CATEGORIES[a.categorie]||CATEGORIES.autre;
            const urg = URGENCES[a.niveauUrgence]||URGENCES.faible;
            const st = statutStyle(a.statut);
            const temps = a.createdAt ? tempsRelatif(a.createdAt.toMillis()) : '';
            return `<div class="alerte-row"><div style="width:10px;height:10px;border-radius:50%;background:${urg.color};margin-top:5px;flex-shrink:0;"></div><div style="flex:1;min-width:0;"><p style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(a.titre||'')}</p><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:10px;font-weight:700;background:${cat.bg};color:${cat.color};padding:2px 8px;border-radius:4px;text-transform:uppercase;">${cat.label}</span><span style="font-size:11px;color:#906f6d;">${temps}</span><span style="font-size:11px;color:#906f6d;">${a.nbConfirmations||0} confirmation${(a.nbConfirmations||0)>1?'s':''}</span></div></div><span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;background:${st.bg};color:${st.color};white-space:nowrap;flex-shrink:0;">${st.label}</span></div>`;
          }).join('');
        } catch(e) { list.innerHTML = '<p style="color:#906f6d;font-size:13px;text-align:center;padding:20px 0;">Impossible de charger les alertes</p>'; }
      }

      async function deconnecter() {
        const result = await Swal.fire({ title: 'Déconnexion', text: 'Voulez-vous vraiment vous déconnecter ?', icon: 'question', showCancelButton: true, confirmButtonColor: '#840015', cancelButtonColor: '#906f6d', confirmButtonText: 'Oui, déconnecter', cancelButtonText: 'Annuler' });
        if (result.isConfirmed) { await auth.signOut(); window.location.href = 'login.html'; }
      }
    </script>
  </body>
</html>
