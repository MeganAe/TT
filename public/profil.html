<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Mon Profil</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family:'Inter',sans-serif; background:#F7F8FF; padding-bottom:80px; }
  .ms { font-family:'Material Symbols Outlined'; }
  .card { background:white; border-radius:16px; border:1px solid #E5E7EB; padding:20px; margin-bottom:14px; box-shadow:0 2px 8px rgba(61,90,254,.05); }
  .avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#3D5AFE,#2739C7); display:flex; align-items:center; justify-content:center; }
  .badge-cat { padding:4px 12px; border-radius:100px; font-size:11px; font-weight:700; }
  .btn-danger { width:100%; height:52px; background:white; border:1.5px solid #E5E7EB; border-radius:14px; color:#6B7280; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-danger:hover { border-color:#FF3D71; color:#FF3D71; background:#FFF0F5; }
  .alerte-row { display:flex; align-items:flex-start; gap:12px; padding:14px 0; border-bottom:1px solid #F3F4F6; }
  .alerte-row:last-child { border-bottom:none; }
  .bottom-nav { position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E5E7EB;display:flex;z-index:40;box-shadow:0 -2px 8px rgba(61,90,254,.05); }
  .nav-item { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;text-decoration:none;color:#9CA3AF;font-size:11px;font-weight:600;gap:3px; }
  .nav-item.active { color:#183ce6; }
  .nav-item .ms { font-size:22px; }
</style>
</head>
<body>

<!-- Header -->
<header style="background:white;border-bottom:1px solid #E5E7EB;position:sticky;top:0;z-index:40;box-shadow:0 2px 8px rgba(61,90,254,.05);">
  <div style="max-width:640px;margin:0 auto;padding:0 16px;height:64px;display:flex;align-items:center;gap:12px;">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,#3D5AFE,#2739C7);border-radius:10px;display:flex;align-items:center;justify-content:center;">
      <span class="ms" style="font-size:18px;color:white;">shield</span>
    </div>
    <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:#1A1F36;">Mon Profil</h1>
  </div>
</header>

<main style="max-width:640px;margin:0 auto;padding:20px 16px;">

  <!-- Card profil -->
  <div class="card" style="text-align:center;padding:28px 20px;">
    <div class="avatar" style="margin:0 auto 16px;">
      <span id="avatarInitiales" style="font-size:26px;font-weight:800;color:white;font-family:'Plus Jakarta Sans',sans-serif;">AB</span>
    </div>
    <h2 id="nomUser" style="font-size:20px;font-weight:700;color:#1A1F36;margin-bottom:4px;">Chargement...</h2>
    <p id="emailUser" style="font-size:13px;color:#6B7280;margin-bottom:10px;"></p>
    <span id="quartierUser" style="background:#EEF0FF;color:#183ce6;padding:4px 14px;border-radius:100px;font-size:12px;font-weight:700;"></span>
  </div>

  <!-- Stats personnelles -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
    <div class="card" style="text-align:center;padding:18px;">
      <p id="nbAlertes" style="font-size:32px;font-weight:800;color:#183ce6;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:4px;">0</p>
      <p style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;">Alertes</p>
    </div>
    <div class="card" style="text-align:center;padding:18px;">
      <p id="nbConfirmations" style="font-size:32px;font-weight:800;color:#00C48C;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:4px;">0</p>
      <p style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;">Confirmations</p>
    </div>
  </div>

  <!-- Mes alertes récentes -->
  <div class="card">
    <h2 style="font-size:15px;font-weight:700;color:#1A1F36;margin-bottom:4px;">Mes alertes récentes</h2>
    <p style="font-size:12px;color:#9CA3AF;margin-bottom:16px;">Vos 10 dernières publications</p>
    <div id="mesAlertesList">
      <p style="color:#9CA3AF;font-size:13px;text-align:center;padding:20px 0;">Chargement...</p>
    </div>
  </div>

  <!-- Déconnexion -->
  <button class="btn-danger" onclick="deconnecter()">
    <span class="ms" style="font-size:20px;">logout</span>
    Se déconnecter
  </button>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="ms">rss_feed</span><span>Alertes</span></a>
  <a href="publier.html" class="nav-item"><span class="ms">add_alert</span><span>Publier</span></a>
  <a href="stats.html" class="nav-item"><span class="ms">analytics</span><span>Stats</span></a>
  <a href="profil.html" class="nav-item active"><span class="ms" style="font-variation-settings:'FILL' 1;">person</span><span>Profil</span></a>
</nav>

<script src="firebase-config.js"></script>
<script>
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }

  document.getElementById('emailUser').textContent = user.email;

  // Charger profil Firestore
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      const data = doc.data();
      const nom = data.nom || user.email;
      document.getElementById('nomUser').textContent = nom;
      document.getElementById('quartierUser').textContent = data.quartier || '';

      // Initiales
      const parts = nom.trim().split(' ');
      let initiales = parts.map(p => p[0] || '').join('').substring(0, 2).toUpperCase();
      document.getElementById('avatarInitiales').textContent = initiales || 'U';

      document.getElementById('nbAlertes').textContent = data.nbAlertes || 0;
      document.getElementById('nbConfirmations').textContent = data.nbConfirmations || 0;
    } else {
      document.getElementById('nomUser').textContent = user.email;
      document.getElementById('avatarInitiales').textContent = user.email[0].toUpperCase();
    }
  } catch(e) {
    document.getElementById('nomUser').textContent = user.email;
  }

  // Charger mes alertes
  chargerMesAlertes(user.uid);
});

async function chargerMesAlertes(uid) {
  const list = document.getElementById('mesAlertesList');
  try {
    const snap = await db.collection('alertes')
      .where('userId', '==', uid)
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) {
      list.innerHTML = '<p style="color:#9CA3AF;font-size:13px;text-align:center;padding:20px 0;">Aucune alerte publiée</p>';
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const a = doc.data();
      const cat = CATEGORIES[a.categorie] || CATEGORIES.autre;
      const urg = URGENCES[a.niveauUrgence] || URGENCES.faible;
      const temps = a.createdAt ? tempsRelatif(a.createdAt.toMillis()) : '';
      return `
        <div class="alerte-row">
          <div style="width:8px;height:8px;border-radius:50%;background:${urg.border};margin-top:5px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:600;color:#1A1F36;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.titre || ''}</p>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:11px;font-weight:700;background:${cat.bg};color:${cat.color};padding:2px 8px;border-radius:4px;">${cat.label}</span>
              <span style="font-size:11px;color:#9CA3AF;">${temps}</span>
              <span style="font-size:11px;color:#9CA3AF;">${a.nbConfirmations || 0} confirmation${(a.nbConfirmations||0)>1?'s':''}</span>
            </div>
          </div>
          <span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:${statutStyle(a.statut).bg};color:${statutStyle(a.statut).color};">${statutStyle(a.statut).label}</span>
        </div>`;
    }).join('');

  } catch(e) {
    list.innerHTML = '<p style="color:#9CA3AF;font-size:13px;text-align:center;padding:20px 0;">Impossible de charger les alertes</p>';
  }
}

function statutStyle(statut) {
  const s = {
    en_attente: { label:'En attente', bg:'#FFF5EC', color:'#FF9F43' },
    confirmee:  { label:'Confirmée',  bg:'#E6FAF5', color:'#00C48C' },
    resolue:    { label:'Résolue',    bg:'#F3F4F6', color:'#6B7280' },
    suspendue:  { label:'Suspendue',  bg:'#FFF0F5', color:'#FF3D71' }
  };
  return s[statut] || s.en_attente;
}

async function deconnecter() {
  if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
    await auth.signOut();
    window.location.href = 'login.html';
  }
}
</script>
</body>
</html>
