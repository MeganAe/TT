<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Mon Profil</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48; }
  body { padding-bottom:80px; background:#fcf9f8; }
  .section-card { background:white;border-radius:12px;border:1px solid #e4bdbb;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .alerte-row { display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #f0eded; }
  .alerte-row:last-child { border-bottom:none;padding-bottom:0; }
  .stat-mini { flex:1;background:white;border-radius:12px;border:1px solid #e4bdbb;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .stat-mini-val { font-size:28px;font-weight:800;line-height:1;margin-bottom:4px; }
  .stat-mini-lbl { font-size:11px;font-weight:700;color:#906f6d;text-transform:uppercase;letter-spacing:.05em; }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="material-symbols-outlined" style="font-size:20px;color:white;">emergency</span>
    <h1 style="font-size:17px;font-weight:800;color:white;">Mon Profil</h1>
  </div>
</header>

<!-- Hero avec avatar -->
<section style="background:#840015;padding:24px 20px 56px;text-align:center;">
  <div id="avatarContainer" style="display:inline-block;margin-bottom:14px;"></div>
  <h2 id="nomUser" style="font-size:22px;font-weight:800;color:white;margin-bottom:4px;">Chargement...</h2>
  <p id="emailUser" style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:10px;"></p>
  <span id="quartierBadge" style="background:rgba(255,255,255,.15);color:white;padding:4px 16px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.3);"></span>
</section>

<main style="max-width:640px;margin:-32px auto 0;padding:0 16px;position:relative;z-index:1;">

  <!-- Stats perso -->
  <div style="display:flex;gap:12px;margin-bottom:14px;">
    <div class="stat-mini">
      <p class="stat-mini-val" id="nbAlertes" style="color:#840015;">0</p>
      <p class="stat-mini-lbl">Alertes</p>
    </div>
    <div class="stat-mini">
      <p class="stat-mini-val" id="nbConfirmations" style="color:#00C48C;">0</p>
      <p class="stat-mini-lbl">Confirmations</p>
    </div>
  </div>

  <!-- Mes alertes -->
  <div class="section-card">
    <h2 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:4px;display:flex;align-items:center;gap:8px;">
      <span class="material-symbols-outlined" style="font-size:18px;color:#840015;">history</span>
      Mes alertes récentes
    </h2>
    <p style="font-size:12px;color:#906f6d;margin-bottom:14px;">Vos 10 dernières publications</p>
    <div id="mesAlertesList">
      <div class="skeleton" style="height:60px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:60px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:60px;"></div>
    </div>
  </div>

  <!-- Déconnexion -->
  <button onclick="deconnecter()" style="width:100%;height:52px;background:white;border:1.5px solid #e4bdbb;border-radius:8px;color:#5b403e;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;margin-bottom:20px;"
    onmouseover="this.style.borderColor='#840015';this.style.color='#840015';this.style.background='#ffdad8'"
    onmouseout="this.style.borderColor='#e4bdbb';this.style.color='#5b403e';this.style.background='white'">
    <span class="material-symbols-outlined" style="font-size:18px;">logout</span>
    Se déconnecter
  </button>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">rss_feed</span>
    <span>Alertes</span>
  </a>
  <a href="publier.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">add_alert</span>
    <span>Publier</span>
  </a>
  <a href="stats.html" class="nav-item">
    <span class="material-symbols-outlined" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">analytics</span>
    <span>Stats</span>
  </a>
  <a href="profil.html" class="nav-item active">
    <span class="material-symbols-outlined" style="font-size:22px;">person</span>
    <span>Profil</span>
  </a>
</nav>

<script src="firebase-config.js"></script>
<script>
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }

  document.getElementById('emailUser').textContent = user.email;

  // Charger profil
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    const data = doc.exists ? doc.data() : {};
    const nom = data.nom || user.email;

    document.getElementById('nomUser').textContent = nom;
    document.getElementById('quartierBadge').textContent = data.quartier || 'Quartier non défini';
    document.getElementById('nbAlertes').textContent = data.nbAlertes || 0;
    document.getElementById('nbConfirmations').textContent = data.nbConfirmations || 0;

    // Avatar SVG dans le hero
    const container = document.getElementById('avatarContainer');
    const img = document.createElement('img');
    img.src = genererAvatar(nom, 80);
    img.style.cssText = 'width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,.4);box-shadow:0 4px 20px rgba(0,0,0,.2);';
    container.appendChild(img);

  } catch(e) {
    document.getElementById('nomUser').textContent = user.email;
    const container = document.getElementById('avatarContainer');
    const img = document.createElement('img');
    img.src = genererAvatar(user.email, 80);
    img.style.cssText = 'width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,.4);';
    container.appendChild(img);
  }

  chargerMesAlertes(user.uid);
});

function statutStyle(s) {
  const styles = {
    en_attente: { label:'En attente', bg:'#FFF5EC', color:'#FF9F43' },
    confirmee:  { label:'Confirmée',  bg:'#E6FAF5', color:'#00C48C' },
    resolue:    { label:'Résolue',    bg:'#f0eded', color:'#906f6d' },
    suspendue:  { label:'Suspendue',  bg:'#ffdad8', color:'#840015' }
  };
  return styles[s] || styles.en_attente;
}

async function chargerMesAlertes(uid) {
  const list = document.getElementById('mesAlertesList');
  try {
    const snap = await db.collection('alertes')
      .where('userId', '==', uid)
      .orderBy('createdAt', 'desc')
      .limit(10)
      .get();

    if (snap.empty) {
      list.innerHTML = '<div style="text-align:center;padding:28px 0;"><span class="material-symbols-outlined" style="font-size:32px;color:#e4bdbb;">inbox</span><p style="color:#906f6d;font-size:13px;margin-top:8px;">Aucune alerte publiée</p></div>';
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const a = doc.data();
      const cat = CATEGORIES[a.categorie] || CATEGORIES.autre;
      const urg = URGENCES[a.niveauUrgence] || URGENCES.faible;
      const st = statutStyle(a.statut);
      const temps = a.createdAt ? tempsRelatif(a.createdAt.toMillis()) : '';
      return `
        <div class="alerte-row">
          <div style="width:10px;height:10px;border-radius:50%;background:${urg.border||urg.color};margin-top:4px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:700;color:#1c1b1b;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(a.titre||'')}</p>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:10px;font-weight:700;background:${cat.bg};color:${cat.color};padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;">${cat.label}</span>
              <span style="font-size:11px;color:#906f6d;">${temps}</span>
              <span style="font-size:11px;color:#906f6d;">${a.nbConfirmations||0} confirmation${(a.nbConfirmations||0)>1?'s':''}</span>
            </div>
          </div>
          <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;background:${st.bg};color:${st.color};white-space:nowrap;flex-shrink:0;">${st.label}</span>
        </div>`;
    }).join('');

  } catch(e) {
    list.innerHTML = '<p style="color:#906f6d;font-size:13px;text-align:center;padding:20px 0;">Impossible de charger les alertes</p>';
  }
}

async function deconnecter() {
  if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
    await auth.signOut();
    window.location.href = 'login.html';
  }
}
</script>
</body>
</html>
