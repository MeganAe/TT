<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Administration</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48; }
  body { padding-bottom:40px;background:#fcf9f8; }
  .user-card { background:white;border-radius:12px;border:1px solid #e4bdbb;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .user-photo { width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #e4bdbb;flex-shrink:0; }
  .alerte-card { background:white;border-radius:12px;border:1px solid #e4bdbb;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(132,0,21,.05); }
  .tab-btn { padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #e4bdbb;background:white;color:#5b403e;transition:all .2s;font-family:'Inter',sans-serif; }
  .tab-btn.active { background:#840015;color:white;border-color:#840015; }
</style>
</head>
<body>

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="index.html" style="color:white;display:flex;align-items:center;">
      <span class="material-symbols-outlined" style="font-size:22px;color:white;">arrow_back</span>
    </a>
    <span class="material-symbols-outlined" style="font-size:20px;color:white;">admin_panel_settings</span>
    <h1 style="font-size:17px;font-weight:800;color:white;">Administration</h1>
  </div>
  <span style="background:rgba(255,255,255,.2);color:white;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;">ADMIN ONLY</span>
</header>

<section style="background:#840015;padding:16px 20px 36px;">
  <p style="font-size:13px;color:rgba(255,255,255,.8);">Gestion des utilisateurs et des alertes signalées</p>
</section>

<main style="max-width:900px;margin:-20px auto 0;padding:0 16px 20px;position:relative;z-index:1;">

  <!-- Accès restreint -->
  <div id="accessDenied" style="display:none;text-align:center;padding:48px 20px;">
    <span class="material-symbols-outlined" style="font-size:48px;color:#e4bdbb;">lock</span>
    <p style="font-weight:700;font-size:16px;color:#1c1b1b;margin-top:12px;">Accès restreint</p>
    <p style="color:#5b403e;font-size:14px;margin-top:6px;">Vous n'avez pas les droits administrateur.</p>
    <a href="index.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:#840015;color:white;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Retour</a>
  </div>

  <div id="adminContent" style="display:none;">

    <!-- Tabs -->
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <button class="tab-btn active" onclick="switchTab(this,'tabAlertes')">Alertes signalées</button>
      <button class="tab-btn" onclick="switchTab(this,'tabUsers')">Utilisateurs</button>
    </div>

    <!-- Tab Alertes signalées -->
    <div id="tabAlertes">
      <div id="alertesSignaleesList">
        <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:12px;"></div>
        <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:12px;"></div>
      </div>
    </div>

    <!-- Tab Utilisateurs -->
    <div id="tabUsers" style="display:none;">
      <div style="position:relative;margin-bottom:16px;">
        <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#906f6d;pointer-events:none;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">search</span>
        <input id="searchUser" type="text" placeholder="Rechercher par nom ou username..." oninput="rechercherUser(this.value)"
          style="width:100%;height:48px;padding:0 16px 0 48px;background:white;border:1.5px solid #e4bdbb;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;box-sizing:border-box;margin-bottom:0;"
          onfocus="this.style.borderColor='#840015'" onblur="this.style.borderColor='#e4bdbb'"/>
      </div>
      <div id="usersList">
        <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:12px;"></div>
        <div class="skeleton" style="height:80px;margin-bottom:12px;border-radius:12px;"></div>
        <div class="skeleton" style="height:80px;border-radius:12px;"></div>
      </div>
    </div>

  </div>

</main>

<script src="firebase-config.js"></script>
<script>
// ADMIN UIDs — ajoute ton UID ici
const ADMIN_UIDS = ['xofFgfRyh8QdhMp8fUYNfKrFv843'];

let tousLesUsers = [];

requireAuth().then(async user => {
  if (!ADMIN_UIDS.includes(user.uid)) {
    document.getElementById('accessDenied').style.display = 'block';
    return;
  }
  document.getElementById('adminContent').style.display = 'block';
  chargerAlertesSignalees();
  chargerUsers();
});

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabAlertes').style.display = tabId === 'tabAlertes' ? 'block' : 'none';
  document.getElementById('tabUsers').style.display = tabId === 'tabUsers' ? 'block' : 'none';
}

async function chargerAlertesSignalees() {
  const list = document.getElementById('alertesSignaleesList');
  const snap = await db.collection('alertes')
    .where('nbSignalements', '>=', 1)
    .orderBy('nbSignalements', 'desc')
    .limit(30)
    .get();

  if (snap.empty) {
    list.innerHTML = '<p style="color:#906f6d;font-size:14px;text-align:center;padding:28px 0;">Aucune alerte signalée</p>';
    return;
  }

  list.innerHTML = snap.docs.map(doc => {
    const a = doc.data();
    const cat = CATEGORIES[a.categorie] || CATEGORIES.autre;
    const urg = URGENCES[a.niveauUrgence] || URGENCES.faible;
    return `
      <div class="alerte-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:${urg.bg};color:${urg.color};text-transform:uppercase;">${urg.label}</span>
              <span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:${cat.bg};color:${cat.color};text-transform:uppercase;">${cat.label}</span>
              <span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#ffdad8;color:#840015;text-transform:uppercase;">
                ${a.nbSignalements} signalement${a.nbSignalements>1?'s':''}
              </span>
            </div>
            <p style="font-size:14px;font-weight:700;color:#1c1b1b;margin-bottom:2px;">${escHtml(a.titre)}</p>
            <p style="font-size:12px;color:#906f6d;">Par ${escHtml(a.userNom||'?')} (@${escHtml(a.userUsername||'?')}) • ${escHtml(a.quartier)}</p>
          </div>
          <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:${a.statut==='suspendue'?'#ffdad8':'#FFF5EC'};color:${a.statut==='suspendue'?'#840015':'#FF9F43'};white-space:nowrap;">${a.statut}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${a.statut !== 'suspendue' ? `<button onclick="suspendreAlerte('${doc.id}')" style="padding:8px 16px;background:#ffdad8;color:#840015;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Suspendre l'alerte</button>` : `<button onclick="restaurerAlerte('${doc.id}')" style="padding:8px 16px;background:#E6FAF5;color:#00C48C;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Restaurer</button>`}
          ${a.userId ? `<button onclick="bloquerUser('${a.userId}','${escHtml(a.userNom||'')}',true)" style="padding:8px 16px;background:#1c1b1b;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Bloquer l'auteur</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function chargerUsers() {
  const snap = await db.collection('users').orderBy('createdAt','desc').limit(50).get();
  tousLesUsers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  afficherUsers(tousLesUsers);
}

function rechercherUser(val) {
  const filtered = val
    ? tousLesUsers.filter(u => (u.nom||'').toLowerCase().includes(val.toLowerCase()) || (u.username||'').toLowerCase().includes(val.toLowerCase()))
    : tousLesUsers;
  afficherUsers(filtered);
}

function afficherUsers(users) {
  const list = document.getElementById('usersList');
  if (users.length === 0) {
    list.innerHTML = '<p style="color:#906f6d;font-size:14px;text-align:center;padding:20px 0;">Aucun utilisateur trouvé</p>';
    return;
  }
  list.innerHTML = users.map(u => {
    const photo = getPhotoUrl(u, 48);
    const bloque = u.estBloque;
    return `
      <div class="user-card">
        <img src="${photo}" onerror="this.src='${genererAvatar(u.nom||'U',48)}'" class="user-photo" alt=""/>
        <div style="flex:1;min-width:0;">
          <p style="font-size:14px;font-weight:700;color:#1c1b1b;margin-bottom:2px;">${escHtml(u.nom||'Sans nom')}</p>
          <p style="font-size:12px;color:#906f6d;">@${escHtml(u.username||'?')} • ${escHtml(u.quartier||'?')}</p>
          <div style="display:flex;gap:12px;margin-top:4px;font-size:11px;color:#906f6d;">
            <span>${u.nbAlertes||0} alertes</span>
            <span style="color:#FF3D71;">${u.nbFaussesAlertes||0} fausses</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
          <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;background:${bloque?'#ffdad8':'#E6FAF5'};color:${bloque?'#840015':'#00C48C'};">
            ${bloque ? 'BLOQUÉ' : 'ACTIF'}
          </span>
          <button onclick="bloquerUser('${u.id}','${escHtml(u.nom||'')}',${!bloque})" style="padding:6px 12px;background:${bloque?'#E6FAF5':'#ffdad8'};color:${bloque?'#00C48C':'#840015'};border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
            ${bloque ? 'Débloquer' : 'Bloquer'}
          </button>
        </div>
      </div>`;
  }).join('');
}

async function bloquerUser(uid, nom, bloquer) {
  const action = bloquer ? 'bloquer' : 'débloquer';
  const result = await Swal.fire({
    title: `${bloquer?'Bloquer':'Débloquer'} cet utilisateur ?`,
    html: `Vous allez ${action} <strong>${escHtml(nom)}</strong>.<br>${bloquer?'L\'utilisateur ne pourra plus se connecter.':'L\'utilisateur pourra de nouveau se connecter.'}`,
    icon: bloquer ? 'warning' : 'question',
    showCancelButton: true,
    confirmButtonColor: bloquer ? '#840015' : '#00C48C',
    cancelButtonColor: '#906f6d',
    confirmButtonText: bloquer ? 'Oui, bloquer' : 'Oui, débloquer',
    cancelButtonText: 'Annuler'
  });
  if (!result.isConfirmed) return;

  await db.collection('users').doc(uid).update({ estBloque: bloquer });
  showToast(bloquer ? `${nom} a été bloqué` : `${nom} a été débloqué`, bloquer?'error':'success');
  chargerUsers();
}

async function suspendreAlerte(alerteId) {
  await db.collection('alertes').doc(alerteId).update({ statut: 'suspendue' });
  showToast('Alerte suspendue');
  chargerAlertesSignalees();
}

async function restaurerAlerte(alerteId) {
  await db.collection('alertes').doc(alerteId).update({ statut: 'en_attente', nbSignalements: 0 });
  showToast('Alerte restaurée');
  chargerAlertesSignalees();
}
</script>
</body>
</html>
