<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Alertes en cours</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48; }
  body { padding-bottom:80px;background:#fcf9f8; }
  .fab { position:fixed;bottom:88px;right:20px;width:56px;height:56px;background:#840015;color:white;border-radius:50%;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(132,0,21,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;z-index:50; }
  .fab:hover { transform:scale(1.08);box-shadow:0 6px 28px rgba(132,0,21,.55); }
  .author-img { width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e4bdbb;flex-shrink:0; }
  .alerte-img { width:100%;max-height:180px;object-fit:cover; }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="material-symbols-outlined" style="color:white;font-size:24px;">notification_important</span>
    <h1 style="font-size:18px;font-weight:800;color:white;">AlertBukavu</h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="liveIndicator" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:100px;">
      <span class="live-dot"></span>
      <span style="color:white;font-size:11px;font-weight:700;">EN DIRECT</span>
    </div>
    <img id="headerAvatar" src="" alt="" style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.4);cursor:pointer;object-fit:cover;" onclick="window.location.href='profil.html'"/>
  </div>
</header>

<!-- Hero -->
<section style="background:#840015;padding:20px 20px 44px;">
  <h2 style="font-size:26px;font-weight:800;color:white;margin-bottom:6px;">Alertes en cours</h2>
  <p style="font-size:13px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:8px;">
    <span class="live-dot"></span>
    <span id="compteurLabel">Chargement...</span>
  </p>
</section>

<!-- Filtres -->
<div style="position:sticky;top:56px;z-index:30;background:white;border-bottom:1px solid #e4bdbb;box-shadow:0 2px 8px rgba(132,0,21,.05);">
  <div style="display:flex;gap:8px;overflow-x:auto;padding:12px 16px;" class="no-scrollbar">
    <button class="pill active" onclick="filtrer(this,'tous')">Toutes</button>
    <button class="pill" onclick="filtrer(this,'securite')">Sécurité</button>
    <button class="pill" onclick="filtrer(this,'eau')">Eau</button>
    <button class="pill" onclick="filtrer(this,'routes')">Routes</button>
    <button class="pill" onclick="filtrer(this,'sante')">Santé</button>
    <button class="pill" onclick="filtrer(this,'meteo')">Météo</button>
  </div>
</div>

<!-- Grille alertes -->
<main style="max-width:900px;margin:0 auto;padding:20px 16px;">
  <div id="alertesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">
    <div class="card" style="height:200px;"><div class="skeleton" style="height:100%;border-radius:12px;"></div></div>
    <div class="card" style="height:200px;"><div class="skeleton" style="height:100%;border-radius:12px;"></div></div>
    <div class="card" style="height:200px;"><div class="skeleton" style="height:100%;border-radius:12px;"></div></div>
  </div>
  <div id="emptyState" style="display:none;text-align:center;padding:64px 20px;">
    <div style="width:72px;height:72px;background:#ffdad8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <span class="material-symbols-outlined" style="font-size:32px;color:#840015;">notifications_none</span>
    </div>
    <p style="font-weight:700;font-size:16px;color:#1c1b1b;margin-bottom:6px;">Aucune alerte</p>
    <p style="color:#5b403e;font-size:14px;">Soyez le premier à signaler un incident</p>
  </div>
</main>

<!-- FAB -->
<button class="fab" onclick="window.location.href='publier.html'" title="Publier une alerte">
  <span class="material-symbols-outlined" style="font-size:26px;color:white;">add_alert</span>
</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span class="material-symbols-outlined" style="font-size:22px;">rss_feed</span>
    <span>Alertes</span>
  </a>
  <a href="publier.html" class="nav-item">
    <span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">add_alert</span>
    <span>Publier</span>
  </a>
  <a href="stats.html" class="nav-item">
    <span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">analytics</span>
    <span>Stats</span>
  </a>
  <a href="profil.html" class="nav-item">
    <span class="material-symbols-outlined ms-o" style="font-size:22px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;">person</span>
    <span>Profil</span>
  </a>
</nav>

<script src="firebase-config.js"></script>
<script>
let toutesLesAlertes = [];
let filtreActuel = 'tous';
let currentUser = null;
let currentUserData = null;

requireAuth().then(async user => {
  currentUser = user;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      currentUserData = doc.data();
      const avatar = document.getElementById('headerAvatar');
      avatar.src = getPhotoUrl(currentUserData, 36);
      avatar.onerror = () => { avatar.src = genererAvatar(currentUserData.nom || 'U', 36); };
    }
  } catch(e) {
    document.getElementById('headerAvatar').src = genererAvatar('U', 36);
  }
  afficherMenuAdmin(false, user);
  chargerAlertes();
});

function chargerAlertes() {
  db.collection('alertes')
    .orderBy('createdAt', 'desc')
    .limit(60)
    .onSnapshot(snapshot => {
      toutesLesAlertes = snapshot.docs
        .map(doc => ({ id: doc.id, ...doc.data() }))
        .filter(a => a.statut !== 'suspendue');
      afficherAlertes();
    }, () => {
      db.collection('alertes').orderBy('createdAt','desc').limit(60)
        .onSnapshot(snap => {
          toutesLesAlertes = snap.docs.map(d=>({id:d.id,...d.data()})).filter(a=>a.statut!=='suspendue');
          afficherAlertes();
        });
    });
}

function filtrer(btn, cat) {
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtreActuel = cat;
  afficherAlertes();
}

function afficherAlertes() {
  let liste = filtreActuel === 'tous' ? toutesLesAlertes : toutesLesAlertes.filter(a => a.categorie === filtreActuel);
  const grid = document.getElementById('alertesGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('compteurLabel').textContent = `${liste.length} alerte${liste.length > 1 ? 's' : ''} active${liste.length > 1 ? 's' : ''}`;

  if (liste.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = liste.map((a, i) => cardHTML(a, i)).join('');
}

function cardHTML(a, index) {
  const cat = CATEGORIES[a.categorie] || CATEGORIES.autre;
  const urg = URGENCES[a.niveauUrgence] || URGENCES.faible;
  const temps = a.createdAt ? tempsRelatif(a.createdAt.toMillis()) : 'récent';
  const delay = Math.min(index * 50, 400);
  const urgClass = `urgence-${a.niveauUrgence || 'faible'}`;

  // Photo auteur
  const authorPhoto = a.userPhotoUrl
    ? `<img src="${escHtml(a.userPhotoUrl)}" onerror="this.src='${genererAvatar(a.userNom||'U',32)}'" class="author-img"/>`
    : `<img src="${genererAvatar(a.userNom || 'U', 32)}" class="author-img"/>`;

  // Image alerte
  const alerteImg = a.imageUrl
    ? `<img src="${escHtml(a.imageUrl)}" alt="Photo alerte" class="alerte-img" style="border-bottom:1px solid #f0eded;"/>`
    : '';

  return `
  <div class="card card-anim ${urgClass}" style="animation-delay:${delay}ms;">
    ${alerteImg}
    <div style="padding:16px 18px 12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:${urg.bg};color:${urg.color};">${urg.label}</span>
        <span style="padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:${cat.bg};color:${cat.color};">${cat.label}</span>
        <span style="margin-left:auto;font-size:11px;color:#906f6d;display:flex;align-items:center;gap:2px;">
          <span class="material-symbols-outlined" style="font-size:13px;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 20;">schedule</span>${temps}
        </span>
      </div>
      <h3 style="font-size:15px;font-weight:700;color:#1c1b1b;margin-bottom:6px;line-height:1.4;">${escHtml(a.titre)}</h3>
      <p style="font-size:13px;color:#5b403e;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escHtml(a.description)}</p>
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#906f6d;">
        <span style="display:flex;align-items:center;gap:4px;">
          <span class="material-symbols-outlined" style="font-size:14px;color:#840015;">location_on</span>${escHtml(a.quartier)}
        </span>
        <span>${a.nbConfirmations||0} confirmation${(a.nbConfirmations||0)>1?'s':''}</span>
      </div>
    </div>

    <!-- Auteur -->
    <div style="display:flex;align-items:center;gap:10px;padding:10px 18px;background:#f6f3f2;border-top:1px solid #f0eded;">
      ${authorPhoto}
      <div>
        <p style="font-size:13px;font-weight:700;color:#1c1b1b;line-height:1.2;">${escHtml(a.userNom || 'Utilisateur')}</p>
        <p style="font-size:11px;color:#906f6d;">@${escHtml(a.userUsername || '')}</p>
      </div>
      ${a.statut === 'confirmee' ? '<span style="margin-left:auto;font-size:10px;font-weight:700;background:#E6FAF5;color:#00C48C;padding:3px 10px;border-radius:100px;">CONFIRMÉE</span>' : ''}
    </div>

    <!-- Actions -->
    <div style="border-top:1px solid #f0eded;padding:10px 18px;display:flex;gap:10px;">
      <button onclick="confirmer('${a.id}')" style="flex:1;padding:9px;border-radius:8px;border:none;background:#E6FAF5;color:#00C48C;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s;" onmouseover="this.style.background='#c8f5e9'" onmouseout="this.style.background='#E6FAF5'">
        <span class="material-symbols-outlined" style="font-size:15px;">check_circle</span>Confirmer
      </button>
      <button onclick="signaler('${a.id}','${escHtml(a.userId)}')" style="padding:9px 14px;border-radius:8px;border:none;background:#ffdad8;color:#840015;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .2s;" onmouseover="this.style.background='#ffb3af'" onmouseout="this.style.background='#ffdad8'">
        <span class="material-symbols-outlined" style="font-size:15px;">flag</span>Signaler
      </button>
    </div>
  </div>`;
}

async function confirmer(alerteId) {
  if (!currentUser) { showToast('Connectez-vous pour confirmer', 'error'); return; }
  const confirmRef = db.collection('confirmations').doc(`${alerteId}_${currentUser.uid}`);
  const exists = await confirmRef.get();
  if (exists.exists) { showToast('Vous avez déjà confirmé cette alerte', 'info'); return; }
  const batch = db.batch();
  batch.set(confirmRef, { alerteId, userId: currentUser.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  batch.update(db.collection('alertes').doc(alerteId), { nbConfirmations: firebase.firestore.FieldValue.increment(1) });
  await batch.commit();
  const doc = await db.collection('alertes').doc(alerteId).get();
  if ((doc.data().nbConfirmations || 0) >= 3 && doc.data().statut === 'en_attente') {
    await db.collection('alertes').doc(alerteId).update({ statut: 'confirmee' });
  }
  showToast('Confirmation enregistrée');
}

async function signaler(alerteId, auteurId) {
  if (!currentUser) { showToast('Connectez-vous pour signaler', 'error'); return; }
  if (auteurId === currentUser.uid) { showToast('Vous ne pouvez pas signaler votre propre alerte', 'warning'); return; }

  const result = await Swal.fire({
    title: 'Signaler cette alerte ?',
    html: 'Vous pensez que cette alerte est <strong>fausse ou trompeuse</strong> ?<br><small style="color:#906f6d;">Après 5 signalements, l\'alerte sera suspendue et l\'auteur sanctionné.</small>',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#840015',
    cancelButtonColor: '#906f6d',
    confirmButtonText: 'Oui, signaler',
    cancelButtonText: 'Annuler'
  });

  if (!result.isConfirmed) return;

  const alerteRef = db.collection('alertes').doc(alerteId);
  await alerteRef.update({ nbSignalements: firebase.firestore.FieldValue.increment(1) });
  const doc = await alerteRef.get();
  const data = doc.data();

  if ((data.nbSignalements || 0) >= 5) {
    // Suspendre l'alerte
    await alerteRef.update({ statut: 'suspendue' });

    // Incrémenter compteur fausses alertes de l'auteur
    if (auteurId) {
      const auteurRef = db.collection('users').doc(auteurId);
      await auteurRef.update({ nbFaussesAlertes: firebase.firestore.FieldValue.increment(1) });
      const auteurDoc = await auteurRef.get();

      // Bloquer automatiquement si >= 3 fausses alertes
      if ((auteurDoc.data().nbFaussesAlertes || 0) >= 3) {
        await auteurRef.update({ estBloque: true });
        showToast('Alerte suspendue. L\'auteur a été bloqué automatiquement.', 'info');
      } else {
        showToast('Alerte signalée et suspendue', 'info');
      }
    }
  } else {
    showToast(`Alerte signalée (${data.nbSignalements}/5 signalements)`);
  }
}
</script>
</body>
</html>
