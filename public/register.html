<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Inscription</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { min-height:max(884px,100dvh); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:#1c1b1b; padding:40px 0; }
</style>
</head>
<body>

<!-- Background -->
<div style="position:absolute;inset:0;z-index:0;">
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMcZwNH9PaJycSQXZPnZC-_HSOTENwx0QNNE7-4uorlL8q6YbeNsaaRuiDlYXrtpzBFiZ5E6J0rXyqZmzmcGw_WsgzFEogYb16b833tuTIMJZ_MnJG-QiQqOj74IXsOK0b5CyshKxyqeTxWCyw9CK07WSrQruhyFVg7g08QNa1_ZkyN8KS3ckEP-UyucX2a8DrVeicBPEpSR8JX3nTnJ1tQCY-VGpaMlLDOZ31Bf2qGV2KZjQZCZt46bDQGhnSQuWP5xd7rlY0SYTz"
    alt="Bukavu" style="width:100%;height:100%;object-fit:cover;filter:brightness(.8) saturate(.5);"/>
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.3),transparent,rgba(0,0,0,.5));"></div>
</div>

<main style="position:relative;z-index:10;width:100%;max-width:420px;padding:0 20px;">
  <div style="background:white;border-radius:12px;box-shadow:0 25px 50px rgba(0,0,0,.3);padding:40px 32px 32px;position:relative;margin-top:48px;">

    <!-- Logo flottant -->
    <div style="position:absolute;top:-44px;left:50%;transform:translateX(-50%);width:88px;height:88px;background:white;border-radius:50%;padding:6px;box-shadow:0 4px 20px rgba(132,0,21,.2);display:flex;align-items:center;justify-content:center;">
      <div class="logo-pulse" style="width:100%;height:100%;border:3px solid #840015;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <span class="material-symbols-outlined" style="color:#840015;font-size:38px;font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48;">emergency</span>
      </div>
    </div>

    <!-- Titre -->
    <div style="text-align:center;margin-bottom:24px;">
      <h1 style="font-size:24px;font-weight:800;color:#840015;letter-spacing:-.01em;margin-bottom:4px;">Créer un compte</h1>
      <p style="font-size:13px;color:#5b403e;font-weight:500;">Rejoignez la communauté AlertBukavu</p>
    </div>

    <form onsubmit="return false;">

      <!-- Nom -->
      <div style="position:relative;margin-bottom:12px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">person</span>
        </div>
        <input id="nom" type="text" class="input-field" placeholder="Nom complet" style="height:52px;font-size:14px;"/>
      </div>

      <!-- Email -->
      <div style="position:relative;margin-bottom:12px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">mail</span>
        </div>
        <input id="email" type="email" class="input-field" placeholder="Adresse email" style="height:52px;font-size:14px;"/>
      </div>

      <!-- Téléphone -->
      <div style="position:relative;margin-bottom:12px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">phone</span>
        </div>
        <input id="telephone" type="tel" class="input-field" placeholder="+243 ..." style="height:52px;font-size:14px;"/>
      </div>

      <!-- Quartier -->
      <div style="position:relative;margin-bottom:12px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:1;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">location_on</span>
        </div>
        <select id="quartier" class="input-field" style="height:52px;font-size:14px;appearance:none;padding-right:40px;cursor:pointer;">
          <option value="">Votre quartier...</option>
        </select>
        <div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">expand_more</span>
        </div>
      </div>

      <!-- Mot de passe -->
      <div style="position:relative;margin-bottom:8px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:18px;">vpn_key</span>
        </div>
        <input id="password" type="password" class="input-field" placeholder="Mot de passe (min. 6 car.)" style="height:52px;font-size:14px;padding-right:44px;"/>
        <button type="button" onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#906f6d;">
          <span class="material-symbols-outlined" id="eyeIcon" style="font-size:18px;">visibility</span>
        </button>
      </div>

      <!-- Erreur -->
      <div id="errorMsg" style="display:none;background:#ffdad6;border:1px solid #ba1a1a;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#93000a;font-size:13px;font-weight:500;"></div>

      <button type="button" id="btnRegister" class="btn-primary" onclick="register()" style="margin-top:12px;font-size:16px;">
        CRÉER MON COMPTE
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>

    </form>

    <div style="margin-top:20px;text-align:center;">
      <a href="login.html" style="font-size:13px;font-weight:600;color:#840015;text-decoration:underline;text-underline-offset:3px;">
        Déjà un compte ? Se connecter
      </a>
    </div>

  </div>

  <div style="margin-top:16px;text-align:center;color:rgba(255,255,255,.7);font-size:11px;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.5);">
    AlertBukavu • Réseau communautaire • Bukavu, RDC
  </div>
</main>

<script src="firebase-config.js"></script>
<script>
  redirectIfAuth();

  // Remplir quartiers
  const sel = document.getElementById('quartier');
  QUARTIERS.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q; opt.textContent = q;
    sel.appendChild(opt);
  });

  function togglePwd() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
  }

  async function register() {
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const quartier = document.getElementById('quartier').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnRegister');
    const err = document.getElementById('errorMsg');

    err.style.display = 'none';

    function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }

    if (!nom) { showErr('Le nom complet est requis.'); return; }
    if (!email) { showErr('L\'adresse email est requise.'); return; }
    if (!telephone) { showErr('Le numéro de téléphone est requis.'); return; }
    if (!quartier) { showErr('Choisissez votre quartier.'); return; }
    if (password.length < 6) { showErr('Mot de passe : minimum 6 caractères.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>&nbsp;Création...';

    try {
      const result = await auth.createUserWithEmailAndPassword(email, password);
      const uid = result.user.uid;

      // Sauvegarder le profil (sans bloquer)
      db.collection('users').doc(uid).set({
        nom, email, telephone, quartier,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        nbAlertes: 0, nbConfirmations: 0
      }).catch(console.error);

      window.location.href = 'index.html';

    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = 'CRÉER MON COMPTE <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>';
      const msgs = {
        'auth/email-already-in-use': 'Cet email est déjà utilisé.',
        'auth/invalid-email': 'Adresse email invalide.',
        'auth/weak-password': 'Mot de passe trop faible.'
      };
      showErr(msgs[e.code] || 'Une erreur est survenue.');
    }
  }
</script>
</body>
</html>
