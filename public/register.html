<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Inscription</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family:'Inter',sans-serif; background:#F7F8FF; }
  .ms { font-family:'Material Symbols Outlined'; font-size:20px; }
  .btn-primary { background:#183ce6; color:white; border:none; border-radius:14px;
    height:52px; font-weight:700; font-size:15px; cursor:pointer; width:100%;
    transition:opacity .2s; }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
  .input-field { height:52px; border:1.5px solid #E5E7EB; border-radius:12px;
    padding:0 16px; font-size:15px; width:100%; outline:none; background:white;
    transition:border-color .2s; box-sizing:border-box; }
  .input-field:focus { border-color:#183ce6; box-shadow:0 0 0 3px rgba(24,60,230,.08); }
  .select-field { height:52px; border:1.5px solid #E5E7EB; border-radius:12px;
    padding:0 16px; font-size:15px; width:100%; outline:none; background:white;
    transition:border-color .2s; box-sizing:border-box; appearance:none; cursor:pointer; }
  .select-field:focus { border-color:#183ce6; }
  .card { background:white; border-radius:20px; padding:32px;
    box-shadow:0 2px 12px rgba(61,90,254,.08); border:1px solid #E5E7EB; }
  .label { display:block;font-weight:600;font-size:13px;color:#1A1F36;margin-bottom:8px; }
  .field-wrap { margin-bottom:18px; }
  .spinner { width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);
    border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-8">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-3"
         style="background:linear-gradient(135deg,#3D5AFE,#2739C7)">
      <span class="ms text-white" style="font-size:24px;">shield</span>
    </div>
    <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:#1A1F36;" class="mb-1">Créer un compte</h1>
    <p style="color:#6B7280;font-size:14px;">Rejoignez la communauté AlertBukavu</p>
  </div>

  <!-- Card formulaire -->
  <div class="card mb-4">

    <div class="field-wrap">
      <label class="label">Nom complet</label>
      <input id="nom" type="text" class="input-field" placeholder="Prénom et Nom"/>
    </div>

    <div class="field-wrap">
      <label class="label">Adresse email</label>
      <input id="email" type="email" class="input-field" placeholder="votre@email.com"/>
    </div>

    <div class="field-wrap">
      <label class="label">Téléphone</label>
      <input id="telephone" type="tel" class="input-field" placeholder="+243 ..."/>
    </div>

    <div class="field-wrap" style="position:relative;">
      <label class="label">Votre quartier</label>
      <select id="quartier" class="select-field">
        <option value="">Choisir un quartier...</option>
      </select>
      <span class="ms" style="position:absolute;right:14px;bottom:14px;color:#9CA3AF;pointer-events:none;">expand_more</span>
    </div>

    <div class="field-wrap" style="position:relative;margin-bottom:8px;">
      <label class="label">Mot de passe</label>
      <input id="password" type="password" class="input-field" placeholder="Min. 6 caractères" style="padding-right:48px;"/>
      <button onclick="togglePwd()" style="position:absolute;right:14px;bottom:14px;background:none;border:none;cursor:pointer;color:#9CA3AF;">
        <span class="ms" id="eyeIcon">visibility</span>
      </button>
    </div>

    <div id="errorMsg" style="display:none;background:#FFF0F5;border:1px solid #FF3D71;border-radius:10px;padding:12px;margin-bottom:16px;color:#FF3D71;font-size:13px;"></div>

    <button id="btnRegister" class="btn-primary" onclick="register()">Créer mon compte</button>
  </div>

  <!-- Séparateur -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <div style="flex:1;height:1px;background:#E5E7EB;"></div>
    <span style="color:#9CA3AF;font-size:13px;">ou</span>
    <div style="flex:1;height:1px;background:#E5E7EB;"></div>
  </div>

  <a href="login.html" style="display:flex;align-items:center;justify-content:center;
    height:52px;background:#EEF0FF;border-radius:14px;color:#183ce6;font-weight:700;
    font-size:14px;text-decoration:none;">
    Déjà un compte ? Se connecter
  </a>

</div>

<script src="firebase-config.js"></script>
<script>
  redirectIfAuth();

  // Remplir le dropdown quartiers
  const sel = document.getElementById('quartier');
  QUARTIERS.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q; opt.textContent = q;
    sel.appendChild(opt);
  });

  function togglePwd() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
    else { input.type = 'password'; icon.textContent = 'visibility'; }
  }

  async function register() {
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const quartier = document.getElementById('quartier').value;
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('btnRegister');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';

    if (!nom) { showError('Le nom est requis.'); return; }
    if (!email) { showError('L\'email est requis.'); return; }
    if (!telephone) { showError('Le téléphone est requis.'); return; }
    if (!quartier) { showError('Choisissez votre quartier.'); return; }
    if (password.length < 6) { showError('Mot de passe : minimum 6 caractères.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    try {
      // Créer le compte Firebase Auth
      const result = await auth.createUserWithEmailAndPassword(email, password);
      const uid = result.user.uid;

      // Sauvegarder le profil Firestore (sans bloquer la navigation)
      db.collection('users').doc(uid).set({
        nom, email, telephone, quartier,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        nbAlertes: 0, nbConfirmations: 0
      }).catch(console.error);

      // Redirection immédiate
      window.location.href = 'index.html';

    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
      let msg = 'Une erreur est survenue.';
      if (e.code === 'auth/email-already-in-use') msg = 'Cet email est déjà utilisé.';
      if (e.code === 'auth/invalid-email') msg = 'Adresse email invalide.';
      if (e.code === 'auth/weak-password') msg = 'Mot de passe trop faible.';
      showError(msg);
    }
  }
</script>
</body>
</html>
