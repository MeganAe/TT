<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Connexion</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family:'Inter',sans-serif; background:#F7F8FF; }
  .ms { font-family:'Material Symbols Outlined'; font-size:20px; }
  .btn-primary { background:#183ce6; color:white; border:none; border-radius:14px;
    height:52px; font-weight:700; font-size:15px; cursor:pointer; width:100%;
    transition:opacity .2s; }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
  .input-field { height:52px; border:1.5px solid #E5E7EB; border-radius:12px;
    padding:0 16px; font-size:15px; width:100%; outline:none; background:white;
    transition:border-color .2s; box-sizing:border-box; }
  .input-field:focus { border-color:#183ce6; box-shadow:0 0 0 3px rgba(24,60,230,.08); }
  .card { background:white; border-radius:20px; padding:32px;
    box-shadow:0 2px 12px rgba(61,90,254,.08); border:1px solid #E5E7EB; }
  .spinner { width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);
    border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
         style="background:linear-gradient(135deg,#3D5AFE,#2739C7)">
      <span class="ms text-white" style="font-size:28px;">shield</span>
    </div>
    <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:#1A1F36;" class="mb-1">AlertBukavu</h1>
    <p style="color:#6B7280;font-size:14px;">Informer. Protéger. Agir.</p>
  </div>

  <!-- Card formulaire -->
  <div class="card mb-4">
    <h2 style="font-size:22px;font-weight:700;color:#1A1F36;margin-bottom:4px;">Bon retour</h2>
    <p style="color:#6B7280;font-size:14px;margin-bottom:24px;">Connectez-vous pour continuer</p>

    <div class="mb-4">
      <label style="display:block;font-weight:600;font-size:13px;color:#1A1F36;margin-bottom:8px;">Adresse email</label>
      <input id="email" type="email" class="input-field" placeholder="votre@email.com"/>
    </div>

    <div class="mb-6" style="position:relative;">
      <label style="display:block;font-weight:600;font-size:13px;color:#1A1F36;margin-bottom:8px;">Mot de passe</label>
      <input id="password" type="password" class="input-field" placeholder="Min. 6 caractères" style="padding-right:48px;"/>
      <button onclick="togglePassword('password','eyeBtn')"
        id="eyeBtn" style="position:absolute;right:14px;bottom:14px;background:none;border:none;cursor:pointer;color:#9CA3AF;">
        <span class="ms" id="eyeIcon">visibility</span>
      </button>
    </div>

    <div id="errorMsg" style="display:none;background:#FFF0F5;border:1px solid #FF3D71;border-radius:10px;padding:12px;margin-bottom:16px;color:#FF3D71;font-size:13px;"></div>

    <button id="btnLogin" class="btn-primary" onclick="login()">Se connecter</button>
  </div>

  <!-- Séparateur -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <div style="flex:1;height:1px;background:#E5E7EB;"></div>
    <span style="color:#9CA3AF;font-size:13px;">ou</span>
    <div style="flex:1;height:1px;background:#E5E7EB;"></div>
  </div>

  <!-- Lien inscription -->
  <a href="register.html" style="display:flex;align-items:center;justify-content:center;
    height:52px;background:#EEF0FF;border-radius:14px;color:#183ce6;font-weight:700;
    font-size:14px;text-decoration:none;transition:background .2s;"
    onmouseover="this.style.background='#dde0ff'" onmouseout="this.style.background='#EEF0FF'">
    Créer un compte
  </a>

</div>

<script src="firebase-config.js"></script>
<script>
  redirectIfAuth();

  function togglePassword(inputId, btnId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';

    if (!email || !password) {
      errorMsg.textContent = 'Veuillez remplir tous les champs.';
      errorMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'index.html';
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      let msg = 'Email ou mot de passe incorrect.';
      if (e.code === 'auth/user-not-found') msg = 'Aucun compte avec cet email.';
      if (e.code === 'auth/wrong-password') msg = 'Mot de passe incorrect.';
      if (e.code === 'auth/invalid-email') msg = 'Adresse email invalide.';
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
  }

  // Connexion avec Entrée
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
