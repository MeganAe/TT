<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connectez-vous à AlertBukavu — plateforme d'alertes communautaires en temps réel pour Bukavu, RDC." />
    <title>AlertBukavu — Connexion</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.hCaptcha.com/1/api.js" async defer></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      html,body{height:100%;margin:0;overflow:hidden}
      .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
    </style>
  </head>
  <body>
    <div class="auth-bg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Bukavu%2C_DR_congo%2C_2020.jpg" alt="Bukavu" />
      <div class="auth-overlay"></div>
    </div>

    <div class="auth-scroll">
      <div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center">
        <div class="glass-card">
          <div class="floating-logo">
            <img src="logo.png" alt="AlertBukavu Logo" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\'logo-pulse\' style=\'width:100%;height:100%;border:3px solid #840015;border-radius:50%;display:flex;align-items:center;justify-content:center\'><span class=\'material-symbols-outlined\' style=\'color:#840015;font-size:46px;font-variation-settings:&quot;FILL&quot; 1,&quot;wght&quot; 700,&quot;GRAD&quot; 0,&quot;opsz&quot; 48\'>notification_important</span></div>'" />
          </div>

          <div style="text-align:center;margin-bottom:28px">
            <h1 style="font-size:28px;font-weight:800;color:#840015;letter-spacing:-.02em;margin-bottom:4px">ALERT BUKAVU</h1>
            <p style="font-size:13px;color:#5b403e;font-weight:500">Informer. Protéger. Agir.</p>
          </div>

          <div id="bloqueMsg" style="display:none;background:#ffdad8;border:1px solid #840015;border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#410006;font-size:13px;font-weight:600;text-align:center">
            Votre compte a été suspendu pour fausse alerte.
          </div>

          <form onsubmit="return false;">
            <div class="input-wrap">
              <input id="identifiant" type="text" class="field-input" placeholder="Nom d'utilisateur ou email" autocomplete="username" />
              <span class="material-symbols-outlined ico">account_circle</span>
            </div>

            <div class="input-wrap" style="margin-bottom:6px">
              <input id="password" type="password" class="field-input" placeholder="Mot de passe" style="padding-right:48px" onkeydown="if(event.key==='Enter')login()" autocomplete="current-password" />
              <span class="material-symbols-outlined ico">vpn_key</span>
              <button type="button" onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#906f6d;display:flex;align-items:center">
                <span class="material-symbols-outlined" id="eyeIcon" style="font-size:18px">visibility</span>
              </button>
            </div>

            <!-- hCaptcha -->
            <div class="captcha-wrap">
              <div class="h-captcha" data-sitekey="6b5a506e-395a-46d0-8bba-77941038b772" data-callback="onCaptchaSuccess" data-expired-callback="onCaptchaExpire"></div>
            </div>

            <button type="button" id="btnLogin" class="btn-primary" onclick="login()" style="margin-top:16px">
              SE CONNECTER
              <span class="material-symbols-outlined" style="font-size:18px;color:white;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48">arrow_forward</span>
            </button>
          </form>

          <div style="margin:20px 0;display:flex;align-items:center;gap:12px">
            <div style="flex:1;height:1px;background:#ddb8b6"></div>
            <span style="color:#906f6d;font-size:12px">ou</span>
            <div style="flex:1;height:1px;background:#ddb8b6"></div>
          </div>

          <a href="register.html" class="btn-secondary">
            <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48">person_add</span>
            Créer un compte
          </a>
        </div>

        <p class="auth-footer">AlertBukavu • Réseau communautaire • Bukavu, RDC</p>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
      let captchaValidated = false;

      function onCaptchaSuccess(token) { captchaValidated = true; }
      function onCaptchaExpire() { captchaValidated = false; }

      if (new URLSearchParams(window.location.search).get('bloque')) {
        document.getElementById('bloqueMsg').style.display = 'block';
        showBloqueAlert();
      }

      auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });

      function togglePwd() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
      }

      async function login() {
        const identifiant = document.getElementById('identifiant').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btnLogin');

        if (!identifiant) { showToast("Entrez votre identifiant", "error"); return; }
        if (!password) { showToast("Entrez votre mot de passe", "error"); return; }
        if (!captchaValidated) { showToast("Veuillez valider le captcha", "error"); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>&nbsp;Connexion...';

        try {
          let email = identifiant;
          if (!identifiant.includes('@')) {
            const username = identifiant.toLowerCase();
            const usernameDoc = await db.collection('usernames').doc(username).get();
            if (usernameDoc.exists) {
              email = usernameDoc.data().email;
            } else {
              const userSnap = await db.collection('users').where('username', '==', username).limit(1).get();
              if (userSnap.empty) throw { code: 'username/not-found' };
              email = userSnap.docs[0].data().email;
            }
          }

          const result = await auth.signInWithEmailAndPassword(email, password);
          const userDoc = await db.collection('users').doc(result.user.uid).get();
          if (userDoc.exists && userDoc.data().estBloque) {
            await auth.signOut();
            await showBloqueAlert();
            resetBtn();
            return;
          }
          window.location.href = 'index.html';
        } catch (e) {
          resetBtn();
          if (typeof hcaptcha !== 'undefined') { hcaptcha.reset(); captchaValidated = false; }
          const msgs = {
            'username/not-found': "Nom d'utilisateur introuvable.",
            'auth/wrong-password': "Mot de passe incorrect.",
            'auth/invalid-credential': "Identifiants incorrects.",
            'auth/user-not-found': "Aucun compte avec cet email.",
            'auth/too-many-requests': "Trop de tentatives. Réessayez plus tard.",
            'auth/invalid-email': "Format d'email invalide."
          };
          showToast(msgs[e.code] || 'Erreur de connexion', 'error');
        }
      }

      function resetBtn() {
        const btn = document.getElementById('btnLogin');
        btn.disabled = false;
        btn.innerHTML = "SE CONNECTER <span class=\"material-symbols-outlined\" style=\"font-size:18px;color:white;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48;\">arrow_forward</span>";
      }
    </script>
  </body>
</html>
