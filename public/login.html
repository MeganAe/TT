<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlertBukavu — Connexion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="style.css"/>
<style>
  .material-symbols-outlined {
    font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  }
  body {
    min-height: max(884px, 100dvh);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: #1c1b1b;
  }
</style>
</head>
<body>

<!-- Background image Bukavu -->
<div style="position:absolute;inset:0;z-index:0;">
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMcZwNH9PaJycSQXZPnZC-_HSOTENwx0QNNE7-4uorlL8q6YbeNsaaRuiDlYXrtpzBFiZ5E6J0rXyqZmzmcGw_WsgzFEogYb16b833tuTIMJZ_MnJG-QiQqOj74IXsOK0b5CyshKxyqeTxWCyw9CK07WSrQruhyFVg7g08QNa1_ZkyN8KS3ckEP-UyucX2a8DrVeicBPEpSR8JX3nTnJ1tQCY-VGpaMlLDOZ31Bf2qGV2KZjQZCZt46bDQGhnSQuWP5xd7rlY0SYTz"
    alt="Bukavu" style="width:100%;height:100%;object-fit:cover;filter:brightness(.85) saturate(.6);"/>
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2),transparent,rgba(0,0,0,.5));"></div>
</div>

<!-- Card connexion -->
<main style="position:relative;z-index:10;width:100%;max-width:400px;padding:0 20px;">
  <div style="background:white;border-radius:12px;box-shadow:0 25px 50px rgba(0,0,0,.3);overflow:visible;padding:48px 32px 32px;display:flex;flex-direction:column;align-items:center;position:relative;margin-top:56px;">

    <!-- Logo flottant -->
    <div style="position:absolute;top:-48px;left:50%;transform:translateX(-50%);width:96px;height:96px;background:white;border-radius:50%;padding:8px;box-shadow:0 4px 20px rgba(132,0,21,.2);display:flex;align-items:center;justify-content:center;">
      <div class="logo-pulse" style="width:100%;height:100%;border:3px solid #840015;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <span class="material-symbols-outlined" style="color:#840015;font-size:42px;font-variation-settings:'FILL' 1,'wght' 700,'GRAD' 0,'opsz' 48;">emergency</span>
      </div>
    </div>

    <!-- Titre -->
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:28px;font-weight:800;color:#840015;letter-spacing:-.01em;margin-bottom:4px;">ALERT BUKAVU</h1>
      <p style="font-size:14px;color:#5b403e;font-weight:500;">Informer. Protéger. Agir.</p>
    </div>

    <!-- Formulaire -->
    <form style="width:100%;" onsubmit="return false;">

      <!-- Email -->
      <div style="position:relative;margin-bottom:14px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:20px;transition:color .2s;" id="iconEmail">mail</span>
        </div>
        <input id="email" type="email" class="input-field" placeholder="Votre adresse email"
          onfocus="document.getElementById('iconEmail').style.color='#840015'"
          onblur="document.getElementById('iconEmail').style.color='#906f6d'"/>
      </div>

      <!-- Mot de passe -->
      <div style="position:relative;margin-bottom:8px;">
        <div style="position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <span class="material-symbols-outlined" style="color:#906f6d;font-size:20px;transition:color .2s;" id="iconPwd">vpn_key</span>
        </div>
        <input id="password" type="password" class="input-field" placeholder="Mot de passe"
          style="padding-right:48px;"
          onfocus="document.getElementById('iconPwd').style.color='#840015'"
          onblur="document.getElementById('iconPwd').style.color='#906f6d'"
          onkeydown="if(event.key==='Enter')login()"/>
        <button type="button" onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#906f6d;display:flex;align-items:center;">
          <span class="material-symbols-outlined" id="eyeIcon" style="font-size:20px;">visibility</span>
        </button>
      </div>

      <!-- Erreur -->
      <div id="errorMsg" style="display:none;background:#ffdad6;border:1px solid #ba1a1a;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#93000a;font-size:13px;font-weight:500;"></div>

      <!-- Bouton connexion -->
      <button type="button" id="btnLogin" class="btn-primary" onclick="login()" style="margin-top:8px;">
        SE CONNECTER
        <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
      </button>

    </form>

    <!-- Lien inscription -->
    <div style="margin-top:24px;text-align:center;">
      <a href="register.html" style="font-size:14px;font-weight:600;color:#840015;text-decoration:underline;text-underline-offset:3px;">
        Pas encore de compte ? S'inscrire
      </a>
    </div>

  </div>

  <!-- Footer -->
  <div style="margin-top:20px;text-align:center;color:rgba(255,255,255,.75);font-size:12px;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.5);">
    AlertBukavu • Réseau communautaire • Bukavu, RDC
  </div>
</main>

<script src="firebase-config.js"></script>
<script>
  redirectIfAuth();

  function togglePwd() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');

    err.style.display = 'none';

    if (!email || !password) {
      err.textContent = 'Veuillez remplir tous les champs.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>&nbsp;Connexion...';

    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'index.html';
    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = 'SE CONNECTER <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>';
      const msgs = {
        'auth/user-not-found': 'Aucun compte avec cet email.',
        'auth/wrong-password': 'Mot de passe incorrect.',
        'auth/invalid-email': 'Adresse email invalide.',
        'auth/invalid-credential': 'Email ou mot de passe incorrect.'
      };
      err.textContent = msgs[e.code] || 'Erreur de connexion. Réessayez.';
      err.style.display = 'block';
    }
  }
</script>
</body>
</html>
